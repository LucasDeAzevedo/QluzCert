{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <title>Recuperar Senha</title>
</head>

<body>

  <main class="container">

    <form>

      <h1>Recuperar Senha</h1>

      <p class="recover-text">
        Digite o e-mail cadastrado e enviaremos um link para redefinir sua senha.
      </p>

      <div class="input-box">
        <input placeholder="E-mail" type="email" required>
        <i class="bx bxs-envelope" aria-hidden="true"></i>
      </div>

      <button type="submit" class="login">Enviar link</button>

      <div class="register-link">
        <p>Lembrou a senha? <a href="{% url 'login_preview' %}">Voltar ao login</a></p>
      </div>

    </form>

  </main>

</body>

</html>
