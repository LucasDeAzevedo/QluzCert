{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Cliente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/cert_manager.css' %}">
</head>
<body>
  <div style="max-width:900px;margin:40px auto;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.05);">
    <h1 style="margin-bottom:4px;font-size:22px;">Novo Cliente</h1>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px">O cliente será gravado na planilha do Google Drive junto com os demais registros.</p>

    {% if messages %}
      {% for message in messages %}
        <div style="padding:10px 14px;border-radius:8px;margin-bottom:14px;background:{% if message.tags == 'error' %}#fdecea{% else %}#fff4e5{% endif %};color:#333;font-size:13px">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" class="form-grid">
      {% csrf_token %}
      <div class="field form-full"><label>Nome do Cliente *</label><input name="cliente" placeholder="Nome completo" required></div>
      <div class="field"><label>CPF / CNPJ</label><input name="cpf_cnpj" placeholder="000.000.000-00"></div>
      <div class="field"><label>E-mail</label><input name="email" type="email" placeholder="email@exemplo.com"></div>
      <div class="field"><label>Telefone</label><input name="telefone1" placeholder="(00) 00000-0000"></div>
      <div class="field"><label>Telefone 2</label><input name="telefone2" placeholder="(00) 00000-0000"></div>
      <div class="field"><label>Contador/Parceiro</label><input name="contador_parceiro"></div>
      <div class="field"><label>Contador/Contabilidade</label><input name="contador_contabilidade"></div>
      <div class="field"><label>Tipo de Certificado</label><input name="tipo_certificado" placeholder="Ex: e-CPF A1"></div>
      <div class="field"><label>Data da Venda</label><input name="data_venda" type="date"></div>
      <div class="field"><label>Data de Vencimento</label><input name="data_vencimento" type="date"></div>
      <div class="field"><label>Valor da Venda (R$)</label><input name="valor_venda" type="number" step="0.01" placeholder="0,00"></div>
      <div class="field"><label>Percentual de Comissão (%)</label><input name="percentual_comissao" type="number" step="0.01" placeholder="0,00"></div>
      <div class="field"><label>Valor da Comissão (R$)</label><input name="valor_comissao" type="number" step="0.01" placeholder="0,00"></div>
      <div class="field"><label>Forma de Pagamento</label><input name="forma_pagamento" placeholder="Pix, Boleto, Cartão..."></div>
      <div class="field"><label>Banco</label><input name="banco"></div>
      <div class="field"><label>Chave PIX</label><input name="chave_pix"></div>
      <div class="field"><label>Pago (Venda)</label>
        <select name="pago_venda">
          <option value="Não" selected>Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="field"><label>Pago (Comissão)</label>
        <select name="pago_comissao">
          <option value="Não" selected>Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="field form-full" style="display:flex;gap:12px;align-items:center;margin-top:8px">
        <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Salvar Cliente</button>
        <a href="{% url 'dashboard' %}" class="btn">Cancelar</a>
      </div>
    </form>
  </div>
</body>
</html>
