{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <title>Cadastro</title>
</head>

<body>

  <main class="container">

    <form>

      <h1>Criar Conta</h1>

      <div class="input-box">
        <input placeholder="Nome completo" type="text" required>
        <i class="bx bxs-user" aria-hidden="true"></i>
      </div>

      <div class="input-box">
        <input placeholder="E-mail" type="email" required>
        <i class="bx bxs-envelope" aria-hidden="true"></i>
      </div>

      <div class="input-box">
        <input placeholder="Senha" type="password" required>
        <i class="bx bxs-lock-alt" aria-hidden="true"></i>
      </div>

      <div class="input-box">
        <input placeholder="Confirmar senha" type="password" required>
        <i class="bx bxs-lock-alt" aria-hidden="true"></i>
      </div>

      <button type="submit" class="login">Cadastrar</button>

      <div class="register-link">
        <p>Já tem uma conta? <a href="{% url 'login_preview' %}">Faça login</a></p>
      </div>

    </form>

  </main>

</body>

</html>
